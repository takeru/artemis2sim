<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--text:#e0e0ff;--muted:#8888aa;--panel:rgba(10,10,30,0.85);
  --cyan:#4fc3f7;--amber:#ff9800;--earth:#4488ff;--moon:#aaa;
  --danger:#ff4444;--success:#44ff88;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:var(--bg);color:var(--text)}
#canvas-container{position:absolute;inset:0;z-index:0}
canvas{display:block}

/* Header */
#header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--panel);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,0.08)}
#header h1{font-size:16px;font-weight:600;letter-spacing:0.5px}
#header .subtitle{font-size:11px;color:var(--muted);margin-left:8px}
#share-btn{background:none;border:1px solid var(--cyan);color:var(--cyan);padding:4px 12px;border-radius:4px;font-size:12px;cursor:pointer;transition:all .2s}
#share-btn:hover{background:var(--cyan);color:var(--bg)}
.cam-btn{background:none;border:1px solid var(--muted);color:var(--muted);padding:3px 8px;border-radius:3px;font-size:11px;cursor:pointer;transition:all .2s}
.cam-btn:hover{border-color:var(--text);color:var(--text)}
.cam-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(79,195,247,0.1)}

/* Info Panel (right side) */
#info-panel{position:fixed;top:48px;right:0;width:320px;bottom:120px;z-index:10;background:var(--panel);backdrop-filter:blur(8px);border-left:1px solid rgba(255,255,255,0.08);padding:16px;overflow-y:auto;transition:transform .3s}
#info-panel h2{font-size:18px;margin-bottom:4px;color:var(--cyan)}
#info-panel .phase-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#info-panel .description{font-size:14px;line-height:1.7;margin-bottom:12px}
.detail-toggle{font-size:12px;color:var(--cyan);cursor:pointer;user-select:none;margin-bottom:8px;display:inline-block}
.detail-content{display:none;font-size:13px;line-height:1.6;color:var(--muted);padding:8px 0;border-top:1px solid rgba(255,255,255,0.05)}
.detail-content.open{display:block}
.glossary{margin-top:12px;padding:8px;background:rgba(79,195,247,0.08);border-radius:6px;font-size:12px;line-height:1.5}
.glossary dt{color:var(--cyan);font-weight:600;margin-top:4px}
.glossary dd{color:var(--muted);margin-bottom:4px}

/* TLI Slider */
#tli-control{margin-top:16px;padding:12px;background:rgba(255,152,0,0.08);border-radius:6px;border:1px solid rgba(255,152,0,0.2)}
#tli-control label{font-size:12px;color:var(--amber);font-weight:600;display:block;margin-bottom:6px}
#tli-control input[type=range]{width:100%;accent-color:var(--amber)}
#tli-control .tli-value{font-size:11px;color:var(--muted);margin-top:4px}
#tli-result{margin-top:8px;font-size:12px;padding:6px 8px;border-radius:4px}
#tli-result.success{background:rgba(68,255,136,0.1);color:var(--success)}
#tli-result.danger{background:rgba(255,68,68,0.1);color:var(--danger)}

/* Bottom Controls */
#controls{position:fixed;bottom:60px;left:0;right:0;z-index:10;display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--panel);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,0.08)}
#play-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--cyan);background:none;color:var(--cyan);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
#play-btn:hover{background:var(--cyan);color:var(--bg)}
#speed-btn{background:none;border:1px solid var(--muted);color:var(--text);padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer;flex-shrink:0;min-width:48px}
#timeline{flex:1;height:6px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.1);border-radius:3px;outline:none;cursor:pointer}
#timeline::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--cyan);cursor:pointer}
#met-display{font-size:11px;color:var(--muted);flex-shrink:0;min-width:100px;text-align:right}

/* Phase markers on timeline */
#phase-markers{position:fixed;bottom:98px;left:80px;right:130px;z-index:10;display:flex;height:16px;pointer-events:none}
.phase-marker{font-size:9px;color:var(--muted);position:absolute;transform:translateX(-50%);white-space:nowrap}

/* Stats Bar */
#stats{position:fixed;bottom:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-around;padding:8px 16px;background:var(--panel);backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,0.08);font-size:12px}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.stat-value{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
#gravity-bar{width:80px;height:6px;border-radius:3px;overflow:hidden;display:flex}
#gravity-earth{background:var(--earth);height:100%;transition:width .3s}
#gravity-moon{background:var(--moon);height:100%;transition:width .3s}
#comm-status{padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
#comm-status.ok{background:rgba(68,255,136,0.15);color:var(--success)}
#comm-status.blackout{background:rgba(255,68,68,0.15);color:var(--danger);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

/* Clock */
#clock{position:fixed;top:52px;left:16px;z-index:10;pointer-events:none}
#clock-met{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:1px;text-shadow:0 2px 8px rgba(0,0,0,0.6)}
#clock-local{font-size:14px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:2px}

/* Event banner */
#event-banner{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(255,152,0,0.9);color:#000;padding:6px 20px;border-radius:4px;font-size:14px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}

/* Responsive */
@media(max-width:768px){
  #info-panel{top:auto;bottom:120px;left:0;right:0;width:100%;max-height:40vh;border-left:none;border-top:1px solid rgba(255,255,255,0.08)}
  #phase-markers{display:none}
}

/* Loading */
#loading{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
#loading h2{font-size:20px}
#loading p{font-size:13px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// Constants
// ============================================================
// Scale: 1 scene unit = 3844 km (384400 km / 100 units)
const SCALE_KM = 3844;
const earthR = 6378 / SCALE_KM;   // ~1.66 scene units
const moonR  = 1737 / SCALE_KM;   // ~0.45 scene units
const SOUND_SPEED = 0.343;          // km/s
const TOKYO_OSAKA = 500;            // km
const GM_EARTH = 398600;            // km^3/s^2
const GM_MOON = 4903;               // km^3/s^2

// Mission timeline (MET in hours) — from NASA press kit
const PHASES = [
  { name: '地球周回', start: 0,     end: 25.6,  color: '#4fc3f7' },
  { name: 'TLI',     start: 25.6,  end: 27,    color: '#ff9800' },
  { name: '月への巡航', start: 27,  end: 103,   color: '#4fc3f7' },
  { name: '月フライバイ', start: 103, end: 139.8, color: '#e040fb' },
  { name: '地球帰還', start: 139.8, end: 215,   color: '#ff9800' },
  { name: '再突入',   start: 215,   end: 217.8, color: '#ff4444' },
];

// ============================================================
// State
// ============================================================
let playing = false;
let speedMultiplier = 100;
const speeds = [1, 10, 100, 1000, 10000];
let speedIdx = 2;
let metHours = 3.6;
let horizData = null;
let trajCurve = null;
let trajLine = null;
let camMode = 'free'; // 'free' | 'craft' | 'earth' | 'moon'

// ============================================================
// Load real trajectory from JPL Horizons data
// ============================================================
async function loadTrajectory() {
  const resp = await fetch('trajectory.json');
  horizData = await resp.json();
  return horizData;
}

// Interpolate trajectory data at a given MET (hours)
function interpAt(metH) {
  const pts = horizData.points;
  if (metH <= pts[0].met) return pts[0];
  if (metH >= pts[pts.length-1].met) return pts[pts.length-1];
  // Binary search
  let lo = 0, hi = pts.length - 1;
  while (hi - lo > 1) {
    const mid = (lo + hi) >> 1;
    if (pts[mid].met <= metH) lo = mid; else hi = mid;
  }
  const a = pts[lo], b = pts[hi];
  const t = (metH - a.met) / (b.met - a.met);
  return {
    x: a.x + (b.x - a.x) * t,
    y: a.y + (b.y - a.y) * t,
    z: a.z + (b.z - a.z) * t,
    mx: a.mx + (b.mx - a.mx) * t,
    my: a.my + (b.my - a.my) * t,
    mz: a.mz + (b.mz - a.mz) * t,
    spd: a.spd + (b.spd - a.spd) * t,
    dE: a.dE + (b.dE - a.dE) * t,
    dM: a.dM + (b.dM - a.dM) * t,
    met: metH,
  };
}

// ============================================================
// Scene Setup
// ============================================================
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(30, 80, 120);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a1a);
container.appendChild(renderer.domElement);

const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.05;
orbitControls.target.set(-20, -40, -20);
orbitControls.minDistance = 10;
orbitControls.maxDistance = 500;

// Lighting
scene.add(new THREE.AmbientLight(0x333355, 1.5));
// Sun direction from JPL Horizons (ICRF, 2026-Apr-02, body ID 10)
// Normalized: (0.9782, 0.1905, 0.0826) — distance 149.5 million km
// 10日間のミッション中に太陽方向は約10°しか変化しないため固定値で十分。
// 地球表面の昼夜はERA（自転角度）で表現される。
const sunLight = new THREE.DirectionalLight(0xffffff, 2);
sunLight.position.set(0.9782, 0.1905, 0.0826).multiplyScalar(500);
scene.add(sunLight);

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = new Float32Array(3000 * 3);
for (let i = 0; i < 3000; i++) {
  const r = 500 + Math.random() * 500;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starVerts[i*3] = r * Math.sin(phi) * Math.cos(theta);
  starVerts[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  starVerts[i*3+2] = r * Math.cos(phi);
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.8, sizeAttenuation: true })));

// Texture loader
const texLoader = new THREE.TextureLoader();

// Earth (at origin) — NASA Blue Marble texture
const earthGroup = new THREE.Group();
const earthMat = new THREE.MeshPhongMaterial({ color: 0x2255cc, emissive: 0x112244, shininess: 30 });
texLoader.load('textures/earth.jpg', tex => {
  earthMat.map = tex; earthMat.color.set(0xffffff); earthMat.emissive.set(0x000000); earthMat.needsUpdate = true;
});
const earthMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 48, 48), earthMat);
earthMesh.scale.setScalar(earthR);
earthGroup.add(earthMesh);
const atmosMat = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.12, side: THREE.BackSide });
const atmosMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), atmosMat);
atmosMesh.scale.setScalar(earthR * 1.08);
earthGroup.add(atmosMesh);
// ICRF: Earth's rotation axis ≈ Z axis. Three.js sphere pole is Y.
// Rotate group so pole aligns with Z.
earthGroup.rotation.x = Math.PI / 2;
scene.add(earthGroup);

// Earth Rotation Angle (ERA) — IAU 2000 model
function getERA(jd) {
  return 2 * Math.PI * (0.7790572732640 + 1.00273781191135448 * (jd - 2451545.0));
}

// Moon — NASA SVS LRO color map
const moonGroup = new THREE.Group();
const moonMat = new THREE.MeshPhongMaterial({ color: 0x888888, emissive: 0x222222, shininess: 10 });
texLoader.load(
  'textures/moon.jpg',
  tex => { moonMat.map = tex; moonMat.color.set(0xffffff); moonMat.emissive.set(0x000000); moonMat.needsUpdate = true; }
);
const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(1, 32, 32), moonMat);
moonMesh.scale.setScalar(moonR);
moonGroup.add(moonMesh);
scene.add(moonGroup);

// Moon orbit trail (built from trajectory data after load)
let moonOrbitLine = null;
function buildMoonOrbitLine() {
  if (moonOrbitLine) scene.remove(moonOrbitLine);
  const pts = horizData.points;
  // Sample moon positions (every 10th point to keep it light)
  const positions = [];
  for (let i = 0; i < pts.length; i += 10) {
    positions.push(new THREE.Vector3(pts[i].mx, pts[i].my, pts[i].mz));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(positions);
  moonOrbitLine = new THREE.Line(geo, new THREE.LineBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.08
  }));
  scene.add(moonOrbitLine);
}


// Spacecraft (Orion) — small bright dot + locator ring
const scGroup = new THREE.Group();

// Bright dot (tiny)
const scDot = new THREE.Mesh(
  new THREE.SphereGeometry(0.03, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
scGroup.add(scDot);

// Inner glow
const scGlow = new THREE.Mesh(
  new THREE.SphereGeometry(0.12, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.3 })
);
scGroup.add(scGlow);

// KSC marker (red dot, rotates with Earth)
const kscMarker = new THREE.Mesh(
  new THREE.SphereGeometry(0.05, 8, 8),
  new THREE.MeshBasicMaterial({ color: 0xff0000 })
);
// KSC in ECEF (fixed to Earth surface)
// lat 28.5724°N, lon -80.649°W
const KSC_LAT = 28.5724 * Math.PI / 180;
const KSC_LON = -80.649 * Math.PI / 180;
const KSC_ECEF = [
  earthR * Math.cos(KSC_LAT) * Math.cos(KSC_LON),
  earthR * Math.cos(KSC_LAT) * Math.sin(KSC_LON),
  earthR * Math.sin(KSC_LAT)
];
scene.add(kscMarker);

// Locator ring — "このあたりにいる"
const ringGeo = new THREE.RingGeometry(1.5, 1.65, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x4fc3f7, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
const scRing = new THREE.Mesh(ringGeo, ringMat);
scGroup.add(scRing);

scene.add(scGroup);

// Communication line (Earth → spacecraft)
const commLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
const commLineMat = new THREE.LineBasicMaterial({ color: 0x44ff88, transparent: true, opacity: 0.3 });
const commLine = new THREE.Line(commLineGeo, commLineMat);
scene.add(commLine);

// Build trajectory line from real data with spline interpolation
function buildTrajectoryLine() {
  if (trajLine) scene.remove(trajLine);
  const pts = horizData.points;

  const phaseColors = [
    new THREE.Color(0x4fc3f7), new THREE.Color(0xff9800),
    new THREE.Color(0x4fc3f7), new THREE.Color(0xe040fb),
    new THREE.Color(0xff9800), new THREE.Color(0xff4444),
  ];

  // Use CatmullRomCurve3 for smooth interpolation
  const controlPts = pts.map(p => new THREE.Vector3(p.x, p.y, p.z));
  const curve = new THREE.CatmullRomCurve3(controlPts, false, 'catmullrom', 0.5);
  const subdivisions = 4000;
  const curvePoints = curve.getPoints(subdivisions);

  const positions = new Float32Array(curvePoints.length * 3);
  const colors = new Float32Array(curvePoints.length * 3);
  for (let i = 0; i < curvePoints.length; i++) {
    const p = curvePoints[i];
    positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z;
    // Map curve parameter to MET for coloring
    const t = i / curvePoints.length;
    const metH = pts[0].met + t * (pts[pts.length-1].met - pts[0].met);
    let pi = PHASES.findIndex(ph => metH >= ph.start && metH < ph.end);
    if (pi < 0) pi = PHASES.length - 1;
    const c = phaseColors[pi];
    colors[i*3] = c.r; colors[i*3+1] = c.g; colors[i*3+2] = c.b;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  trajLine = new THREE.Line(geo, new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.6
  }));
  scene.add(trajLine);
}

// ============================================================
// UI Updates
// ============================================================
function getCurrentPhaseIdx(metH) {
  for (let i = PHASES.length - 1; i >= 0; i--) {
    if (metH >= PHASES[i].start) return i;
  }
  return 0;
}

function updateInfoPanel(metH) {
  const idx = getCurrentPhaseIdx(metH);
  const exp = explanations[idx];
  document.getElementById('phase-label').textContent = `PHASE ${idx}`;
  document.getElementById('phase-title').textContent = exp.title;
  document.getElementById('phase-desc').textContent = exp.desc;
  document.getElementById('detail-content').innerHTML = exp.detail;
  const glossDiv = document.getElementById('glossary');
  if (exp.glossary && Object.keys(exp.glossary).length) {
    let html = '<dl>';
    for (const [term, def] of Object.entries(exp.glossary)) {
      html += `<dt>${term}</dt><dd>${def}</dd>`;
    }
    glossDiv.innerHTML = html + '</dl>';
    glossDiv.style.display = 'block';
  } else {
    glossDiv.style.display = 'none';
  }
}

// ============================================================
// Communication blackout check
// ============================================================
function checkBlackout(scPos, moonPos) {
  // Is the Moon between Earth (origin) and the spacecraft?
  const dir = scPos.clone().normalize();
  const len = scPos.length();
  const toMoon = moonPos.clone();
  const proj = toMoon.dot(dir);
  if (proj < 0 || proj > len) return false;
  const closest = dir.clone().multiplyScalar(proj);
  return closest.distanceTo(moonPos) < moonR * 1.2;
}

// Timeline & Controls

const MISSION_HOURS = 217.8;
const timeline = document.getElementById('timeline');
timeline.addEventListener('input', () => {

  else if (tli > 1.12) { msg = '注意: 月に近づきすぎ'; css = 'danger'; }

// Phase markers + event markers (built after data loads)
function buildMarkers() {
  const markersEl = document.getElementById('phase-markers');
  markersEl.innerHTML = '';
  // Phase labels
  PHASES.forEach(p => {
    const pct = ((p.start + p.end) / 2 / MISSION_HOURS) * 100;
    const m = document.createElement('div');
    m.className = 'phase-marker';
    m.style.left = pct + '%';
    m.textContent = p.name;
    m.style.color = p.color;
    markersEl.appendChild(m);
  });
  // Event tick marks on timeline
  if (horizData && horizData.events) {
    horizData.events.forEach(ev => {
      const pct = (ev.met / MISSION_HOURS) * 100;
      if (pct < 0 || pct > 100) return;
      const tick = document.createElement('div');
      tick.style.cssText = `position:absolute;left:${pct}%;top:12px;width:1px;height:6px;background:var(--amber);opacity:0.5`;
      markersEl.appendChild(tick);
    });
  }
}

// Current event display
let lastEventIdx = -1;
function getCurrentEvent(metH) {
  if (!horizData || !horizData.events) return null;
  const evts = horizData.events;
  for (let i = evts.length - 1; i >= 0; i--) {
    if (metH >= evts[i].met) return { idx: i, ...evts[i] };
  }
  return null;
}

// ============================================================
// Frame update — position everything from real data
// ============================================================
function updateFrame(metH) {
  if (!horizData) return;
  const d = interpAt(metH);

  // Spacecraft position
  scGroup.position.set(d.x, d.y, d.z);

  // Moon position (dynamic!)
  moonGroup.position.set(d.mx, d.my, d.mz);

  // Comm line
  const cp = commLine.geometry.attributes.position;
  cp.setXYZ(0, 0, 0, 0);
  cp.setXYZ(1, d.x, d.y, d.z);
  cp.needsUpdate = true;

  // Blackout check
  const scPos = new THREE.Vector3(d.x, d.y, d.z);
  const moonPos = new THREE.Vector3(d.mx, d.my, d.mz);
  const blackout = checkBlackout(scPos, moonPos);
  const comm = document.getElementById('comm-status');
  if (blackout) {
    comm.textContent = '通信断'; comm.className = 'blackout';
    commLineMat.color.setHex(0xff4444); commLineMat.opacity = 0.1;
  } else {
    comm.textContent = '正常'; comm.className = 'ok';
    commLineMat.color.setHex(0x44ff88); commLineMat.opacity = 0.3;
  }

  // Stats
  document.getElementById('dist-earth').textContent = Math.round(d.dE).toLocaleString() + ' km';
  const osakaX = Math.round(d.dE / TOKYO_OSAKA);
  document.getElementById('dist-compare').textContent = osakaX > 1 ? `東京↔大阪 × ${osakaX.toLocaleString()}` : '';

  document.getElementById('speed-val').textContent = d.spd.toFixed(1) + ' km/s';
  document.getElementById('speed-compare').textContent = `音速の ${Math.round(d.spd / SOUND_SPEED).toLocaleString()} 倍`;

  const gE = GM_EARTH / (d.dE * d.dE);
  const gM = GM_MOON / (d.dM * d.dM);
  const ePct = gE / (gE + gM) * 100;
  document.getElementById('gravity-earth').style.width = ePct + '%';
  document.getElementById('gravity-moon').style.width = (100 - ePct) + '%';

  // MET display
  const days = Math.floor(metH / 24);
  const hrs = Math.floor(metH % 24);
  const mins = Math.floor((metH * 60) % 60);
  const secs = Math.floor((metH * 3600) % 60);
  const metStr = `T+${String(days).padStart(2,'0')}d ${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  document.getElementById('met-display').textContent = metStr;
  document.getElementById('clock-met').textContent = metStr;

  // Local time: launch 2026-04-01 22:24 UTC + MET
  const launchUTC = new Date(Date.UTC(2026, 3, 1, 22, 24, 0));
  const current = new Date(launchUTC.getTime() + metH * 3600 * 1000);
  const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localStr = current.toLocaleString(undefined, {
    month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
  });
  document.getElementById('clock-local').textContent = `${localStr} ${tz}`;

  // Info panel
  updateInfoPanel(metH);

  // Event notification
  const ev = getCurrentEvent(metH);
  if (ev && ev.idx !== lastEventIdx) {
    lastEventIdx = ev.idx;
    const evEl = document.getElementById('event-banner');
    evEl.textContent = `▶ ${ev.name}`;
    evEl.style.opacity = '1';
    setTimeout(() => { evEl.style.opacity = '0'; }, 3000);
  }
}

// ============================================================
// Animation Loop
// ============================================================
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  const dt = (now - lastTime) / 1000;
  lastTime = now;

  if (playing && horizData) {
    metHours += (dt * speedMultiplier) / 3600;
    const maxMet = horizData.last_met_h;
    if (metHours > maxMet) metHours = horizData.first_met_h;
    timeline.value = (metHours / MISSION_HOURS) * 1000;
    updateFrame(metHours);
  }

  // Locator ring always faces camera
  scRing.lookAt(camera.position);

  // Glow pulse
  scGlow.material.opacity = 0.25 + 0.15 * Math.sin(now * 0.003);

  // Camera follow modes
  if (camMode !== 'free' && horizData) {
    const d = interpAt(metHours);
    const scPos = new THREE.Vector3(d.x, d.y, d.z);
    const moonPos = new THREE.Vector3(d.mx, d.my, d.mz);
    const earthPos = new THREE.Vector3(0, 0, 0);
    const nearEarth = d.dE < 50000; // within 50,000 km of Earth

    if (camMode === 'craft') {
      if (nearEarth) {
        // Near Earth: look at spacecraft with Earth as background
        const earthToSc = scPos.clone().sub(earthPos).normalize();
        const camTarget = scPos;
        const camPos = scPos.clone().add(earthToSc.multiplyScalar(3));
        camera.position.lerp(camPos, 0.05);
        orbitControls.target.lerp(camTarget, 0.05);
      } else {
        // Far from Earth: wide view showing full trajectory
        const center = scPos.clone().add(earthPos).multiplyScalar(0.5);
        const dist = scPos.distanceTo(earthPos);
        const offset = new THREE.Vector3(0, dist * 0.6, dist * 0.8);
        camera.position.lerp(center.clone().add(offset), 0.03);
        orbitControls.target.lerp(center, 0.03);
      }
      orbitControls.enabled = false;
    } else if (camMode === 'earth') {
      const camPos = new THREE.Vector3(0, earthR * 4, earthR * 6);
      camera.position.lerp(camPos, 0.05);
      orbitControls.target.lerp(earthPos, 0.05);
      orbitControls.enabled = false;
    } else if (camMode === 'moon') {
      const camPos = moonPos.clone().add(new THREE.Vector3(0, moonR * 5, moonR * 8));
      camera.position.lerp(camPos, 0.05);
      orbitControls.target.lerp(moonPos, 0.05);
      orbitControls.enabled = false;
    }
  }

  // Earth rotation
  // Earth rotation synced to mission time (ERA)
  if (horizData) {
    const jd = horizData.launch_jd + metHours / 24;
    earthMesh.rotation.y = getERA(jd);

    // KSC marker: ECEF → ICRF (rotate by ERA around Z)
    const era = getERA(jd);
    const cosE = Math.cos(era), sinE = Math.sin(era);
    kscMarker.position.set(
      KSC_ECEF[0] * cosE - KSC_ECEF[1] * sinE,
      KSC_ECEF[0] * sinE + KSC_ECEF[1] * cosE,
      KSC_ECEF[2]
    );
  }

  orbitControls.update();
  renderer.render(scene, camera);
}

// ============================================================
// Init
// ============================================================
async function init() {
  await loadTrajectory();
  buildTrajectoryLine();
  buildMoonOrbitLine();
  buildMarkers();
  metHours = 0;
  updateFrame(0);

  document.getElementById('loading').classList.add('hidden');
  animate(performance.now());
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
